<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
 <title>Weather Dashboard</title>
 
</head>
<body>
 <h1>🌤 Weather Dashboard</h1>
 <form id="search-form">
 <input type="text" id="city-input" placeholder="Enter a city name...">
 <button type="submit" id="search-btn">Get Weather</button>
 </form>
 <div id="status"></div>
 <div id="error-msg"></div>
 <div id="weather-card">
 <h2 id="city-name"></h2>
 <div class="row">
 <span class="label">Temperature</span>
 <span class="value" id="temp"></span>
 </div>
 <div class="row">
 <span class="label">Wind Speed</span>
 <span class="value" id="wind"></span>
 </div>
 <div class="row">
 <span class="label">Condition</span>
 <span class="value" id="condition"></span>
 </div>
 </div>
 <script src="weather.js"></script>
</body>
</html>
